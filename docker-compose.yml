services:
  postgres:
    image: postgres:16-alpine
    container_name: vibe-tape-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vibe_tape
      POSTGRES_USER: vibe_tape
      POSTGRES_PASSWORD: vibe_tape
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibe_tape"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
