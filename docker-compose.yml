services:
  postgres:
    image: postgres:16-alpine
    container_name: vibe-tape-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vibe_tape
      POSTGRES_USER: vibe_tape
      POSTGRES_PASSWORD: vibe_tape
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibe_tape"]
      interval: 5s
      timeout: 5s
      retries: 5

  inngest:
    image: inngest/inngest:latest
    container_name: vibe-tape-inngest
    command: inngest dev -u http://host.docker.internal:3000/api/inngest
    ports:
      - "8288:8288"
    environment:
      INNGEST_DEV: 1
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
